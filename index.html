<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>北京房价交互可视化</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div id="title-row">
    <div>
      <h1>北京二手房成交价格探索 <span class="sub">2002–2018 · 链家数据</span></h1>
    </div>
    <div id="stats-bar">
      <div class="stat-card"><div class="stat-val" id="s-count">—</div><div class="stat-lbl">套数</div></div>
      <div class="stat-card"><div class="stat-val" id="s-avg">—</div><div class="stat-lbl">均价 元/㎡</div></div>
      <div class="stat-card"><div class="stat-val" id="s-med">—</div><div class="stat-lbl">中位数 元/㎡</div></div>
      <div class="stat-card"><div class="stat-val" id="s-max">—</div><div class="stat-lbl">最高 元/㎡</div></div>
      <div class="stat-card"><div class="stat-val" id="s-min">—</div><div class="stat-lbl">最低 元/㎡</div></div>
      <div class="stat-card"><div class="stat-val" id="s-avgArea">—</div><div class="stat-lbl">均面积 ㎡</div></div>
    </div>
  </div>
  <div id="controls">
    <div class="ctrl-group">
      <label>单价（元/㎡）</label>
      <span id="price-display">5,000 – 150,000</span>
      <div id="price-slider" class="range-slider"></div>
    </div>
    <div class="ctrl-group">
      <label>面积（㎡）</label>
      <span id="area-display">20 – 500</span>
      <div id="area-slider" class="range-slider"></div>
    </div>
    <div class="ctrl-group">
      <label>装修</label>
      <select id="reno-filter">
        <option value="0">全部</option>
        <option value="1">毛坯</option>
        <option value="2">简装</option>
        <option value="3">精装</option>
        <option value="4">豪装</option>
      </select>
    </div>
    <div class="ctrl-group checks">
      <label><input type="checkbox" id="subway-only"> 地铁旁</label>
      <label><input type="checkbox" id="elevator-only"> 有电梯</label>
    </div>
    <button id="brush-btn" title="在地图上框选区域">⬚ 框选</button>
    <button id="reset-btn">↺ 重置</button>
    <button id="story-toggle-btn" style="display:none" title="重新打开叙事导览">📖 导览</button>
  </div>
</header>

<main>
  <!-- 叙事面板 -->
  <aside id="story-panel">
    <div id="story-header">
      <span>故事导览</span>
      <button id="story-close-btn" title="关闭导览">✕</button>
    </div>
    <div id="story-content">
      <h3 id="story-title"></h3>
      <p id="story-text"></p>
      <div id="story-insight"></div>
    </div>
    <div id="story-progress">
      <span class="step-dot" data-step="0"></span>
      <span class="step-dot" data-step="1"></span>
      <span class="step-dot" data-step="2"></span>
      <span class="step-dot" data-step="3"></span>
      <span class="step-dot" data-step="4"></span>
    </div>
    <div id="story-nav">
      <button id="prev-btn" disabled>← 上一步</button>
      <span id="step-indicator">1 / 5</span>
      <button id="next-btn">下一步 →</button>
    </div>
  </aside>

  <!-- 地图 -->
  <div id="map-wrap">
    <div id="map"></div>
    <div id="map-legend"></div>
  </div>

  <!-- 右侧图表 -->
  <div id="right-panel">
    <div id="bar-wrap">
      <div id="bar-header">
        <select id="metric-select">
          <option value="" disabled>切换区域分析维度：</option>
          <option value="avgPrice" selected>各区平均单价</option>
          <option value="avgTotal">各区平均总价</option>
          <option value="count">各区总挂牌房源数</option>
          <option value="avgSquare">各区套均面积</option>
          <option value="elevatorRate">各区电梯房普及率</option>
          <option value="subwayRate">各区地铁房覆盖率</option>
        </select>
      </div>
      <svg id="bar"></svg>
    </div>
    <div id="trend-wrap">
      <div id="trend-header">
        <div class="tab-row">
          <button class="tab-btn active" data-tab="trend">价格趋势</button>
          <button class="tab-btn" data-tab="scatter">价格×面积</button>
        </div>
        <small id="trend-hint">拖拽选择时间段</small>
      </div>
      <svg id="trend" class="tab-pane active"></svg>
      <svg id="scatter-plot" class="tab-pane"></svg>
    </div>
  </div>
</main>

<div id="tooltip"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
